<body onload="init()" id="mainbody">
    <!-- General Idea:
     Line of covers, two come down to be compared manually as requested by the sorting algorithm
     Would be easier if the only possible swap was between elements that were just compared
     However, quicksort does not work like that, it mainly compares to a pivot element that doesn't move
     Also, sorts which are exclusively swapping usually have n^2 average and worst case 
     I would like to find a sort which (highest to lowest priority):
     1. is comparison based (no counting sort)
     2. has worst case nlogn (no insertion/bubble/selection/)
     3. swaps 2 elements after comparing them (would be nice for the visuals)
     shellsort could be good, like a cooler insertion sort
     -->
    <div id="lineudiv">
        <!-- contains the line of covers in the current order, would have to automatically insert 
         covers into div. Would have to either create a swap in place or refresh line every change
           -->
    </div>
    <div id="gamediv">
        <div id="card1div" class="gamecard">
            <img class="gamecover" id="cover1" src="../images/fallback.jpg"></img>
            <p class="gametitle" id="title1">PLACEHOLDER</p>
        </div>
        <div id="card2div" class="gamecard">
            <img class="gamecover" id="cover2" src="../images/fallback.jpg"></img>
            <p class="gametitle" id="title2">PLACEHOLDER</p>
        </div>
    </div>
    <p id="outputp"></p>
    <div id="outputd"></div>
</body>

<body onload="init()" id="mainbody">
    <!-- General Idea:
     Line of covers, two come down to be compared manually as requested by the sorting algorithm
     Would be easier if the only possible swap was between elements that were just compared
     However, quicksort does not work like that, it mainly compares to a pivot element that doesn't move
     Also, sorts which are exclusively swapping usually have n^2 average and worst case -->
    <div id="lineudiv">
        <!-- contains the line of covers in the current order, would have to automatically insert 
         covers into div. Would have to either create a swap in place or refresh line every change
           -->
    </div>
    <p id="outputp"></p>
    <div id="outputd"></div>
</body>
